name: Extension Checks

on:
  pull_request:
    branches:
      - master
    paths:
      - '**'

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      matrix:
        os: ['ubuntu-latest']
        node-version: ['24.18.0']
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install
        run: |
          npm ci
      - name: Lint
        run: |
          npm run lint
      - name: Audit
        run: |
          npm audit --audit-level moderate --production
      - name: Tests
        env:
          CI: true
        run: |
          npm run test
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage/lcov.info
      - name: Build Chrome and Firefox
        run: |
          npm run build:all
      - name: Package Chrome CRX
        run: |
          npx --yes crx3 dist/chrome --crx lrcopy-chrome.crx
      - name: Package Firefox ZIP
        run: |
          (cd dist/firefox && zip -r ../../lrcopy-firefox.zip .)
      - name: Upload extension packages
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: |
            lrcopy-chrome.crx
            lrcopy-firefox.zip
