<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>lrcopy</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-width: 240px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.35;
      }

      .status {
        font-weight: 600;
      }

      .detail {
        margin-top: 6px;
        opacity: 0.75;
      }

      .error {
        color: #c62828;
      }

      .settings {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      }

      .settings[hidden] {
        display: none;
      }

      .settings-label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
        font-size: 12px;
        opacity: 0.85;
      }

      .settings input[type='range'] {
        width: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="status" class="status">Working…</div>
    <div id="detail" class="detail"></div>
    <div id="settings" class="settings" hidden>
      <label class="settings-label" for="quality">
        <span>JPEG quality</span>
        <span id="quality-value">72%</span>
      </label>
      <input
        id="quality"
        type="range"
        min="10"
        max="100"
        step="1"
        value="72"
      />
    </div>
    <script type="module" src="./copy.ts"></script>
  </body>
</html>
